name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          
          # Force load the user environment profiles where Node/NPM paths live
          if [ -f ~/.profile ]; then source ~/.profile; fi
          if [ -f ~/.bashrc ]; then source ~/.bashrc; fi
          
          # Explicitly add common Node/NPM binary paths just in case
          export PATH=$PATH:/usr/bin:/usr/local/bin:$(npm get prefix 2>/dev/null)/bin
          
          PROJECT_DIR="/home/ubuntu/devops-assignment"
          if [ ! -d "$PROJECT_DIR" ]; then
            git clone https://github.com/${{ github.repository }}.git $PROJECT_DIR
          fi
          
          cd $PROJECT_DIR
          git pull origin main
          
          # Determine the executable handle for PM2 (direct binary vs npx wrapper)
          if command -v pm2 &> /dev/null; then
            PM2_CMD="pm2"
          else
            echo "Global PM2 alias missing; falling back to npx wrapper tool execution tier..."
            PM2_CMD="npx pm2"
          fi
          
          # Process management lifecycle execution
          if $PM2_CMD describe simple-api > /dev/null 2>&1; then
            echo "Reloading existing backend process..."
            $PM2_CMD reload simple-api
          else
            echo "Starting new backend process..."
            $PM2_CMD start app/index.js --name "simple-api" --env PORT=8080
          fi
          
          $PM2_CMD save
          
          # Ensure Nginx config is valid and apply changes
          sudo nginx -t
          sudo systemctl reload nginx
          
          echo "Deployment completed successfully!"