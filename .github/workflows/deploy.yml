name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          
          PROJECT_DIR="/home/ubuntu/devops-assignment"
          if [ ! -d "$PROJECT_DIR" ]; then
            git clone https://github.com/${{ github.repository }}.git $PROJECT_DIR
          fi
          
          cd $PROJECT_DIR
          git pull origin main
          
          # Direct invocation using the verified system binary path
          PM2_PATH="/usr/bin/pm2"
          
          # Process management execution loop
          if $PM2_PATH describe simple-api > /dev/null 2>&1; then
            echo "Reloading existing backend process..."
            $PM2_PATH reload simple-api
          else
            echo "Starting new backend process..."
            $PM2_PATH start app/index.js --name "simple-api" --env PORT=8080
          fi
          
          $PM2_PATH save
          
          # Ensure Nginx config is valid and apply changes
          sudo nginx -t
          sudo systemctl reload nginx
          
          echo "Deployment completed successfully!"